    var counts = {};
    tasks.forEach(function(t){ counts[t.category] = (counts[t.category] || 0) + 1; });
    _catCountCache = counts;
    _catCountCacheKey = ccKey;
  }
  return '<div class="side">'
    + '<div><h5>连续打卡</h5><div class="streak-box"><div class="streak-num">' + streak + streakArrow + '</div><div class="streak-lbl">天连续' + checkMark + '</div></div></div>'
    + '<div><h5>分类筛选</h5><div class="cat-list">'
    + '<div class="cat-item ' + (filterCat==='all'?'on':'') + '" data-cat="all"><span class="cat-dot" style="background:var(--accent)"></span><span>全部</span><span class="cat-cnt">' + tasks.length + '</span></div>'
    + CATS.map(function(c){
      var cnt = _catCountCache[c.id] || 0;
      return '<div class="cat-item ' + (filterCat===c.id?'on':'') + '" data-cat="' + c.id + '"><span class="cat-dot" style="background:' + c.color + '"></span><span>' + c.icon + ' ' + c.name + '</span><span class="cat-cnt">' + cnt + '</span></div>';
    }).join('')
    + '</div></div>'
    + '<div><h5>数据概览</h5><div class="stats-mini">'
    + '<div class="row"><span class="lbl">总记录数</span><span class="val">' + tasks.length + '</span></div>'
    + '<div class="row"><span class="lbl">活跃天数</span><span class="val">' + totalDays + '</span></div>'
    + '<div class="row"><span class="lbl">最长连续</span><span class="val">' + longest + '天</span></div>'
    + '<div class="row"><span class="lbl">任务分组</span><span class="val">' + groups.length + '</span></div>'
    + '</div></div>'
    + '<div class="side-actions">'
    + '<button class="btn-s" id="sa-export">📥 导出</button>'
    + '<button class="btn-s" id="sa-import">📤 导入</button>'
    + '</div></div>';
}

// ========== TODAY VIEW ==========
function renderToday(el){
  var today = todayStr();
  var yesterday = fmtDate(subDays(new Date(), 1));
  var todayTasks = tasks.filter(function(t){ return t.date === today; }).sort(function(a,b){ return (b.createdAt || '').localeCompare(a.createdAt || ''); });
  var yesterdayTasks = tasks.filter(function(t){ return t.date === yesterday; });
  var streak = calcStreak();
  var todayChecked = getDateSet()[today];

  // Quick-add: most recent 6 unique task names
  var seenQuick = new Set();
  var quickTasks = tasks.filter(function(t){
    if(seenQuick.has(t.name)) return false;
    seenQuick.add(t.name);
    return true;
  }).sort(function(a,b){ return (b.createdAt || '').localeCompare(a.createdAt || ''); }).slice(0, 8);

  // Insights
  var insights = [];
  // Stale groups: groups not recorded in 7+ days
  var staleGroups = [];
  groups.forEach(function(g){
    var gt = tasks.filter(function(t){ return t.groupId === g.id; }).sort(function(a,b){ return b.date.localeCompare(a.date); });
    if(gt.length >= 2){
      var daysSince = diffDays(gt[0].date, today);
      if(daysSince >= 7) staleGroups.push({name: g.name, days: daysSince, icon: catIcon(getGroupCategory(g.id))});
    }
  });
  // Week comparison
  var wc = calcWeekCompare();
  if(wc.lastWeek > 0){
    var pct = Math.round((wc.thisWeek - wc.lastWeek) / wc.lastWeek * 100);
    if(pct > 0) insights.push('本周已记录 <b>' + wc.thisWeek + '</b> 条，比上周多 <b>' + pct + '%</b> 📈');
    else if(pct < 0) insights.push('本周已记录 <b>' + wc.thisWeek + '</b> 条，比上周少 <b>' + Math.abs(pct) + '%</b> 📉');
    else insights.push('本周记录量与上周持平（' + wc.thisWeek + ' 条）');
  } else if(wc.thisWeek > 0){
    insights.push('本周已记录 <b>' + wc.thisWeek + '</b> 条');
  }
  // Most active weekday
  var wdC = [0,0,0,0,0,0,0];
  tasks.forEach(function(t){ var d = parseDate(t.date); if(d) wdC[getDayIndex(d)]++; });
  var wdMax = 0, wdMaxIdx = 0;
  wdC.forEach(function(c,i){ if(c > wdMax){ wdMax = c; wdMaxIdx = i; } });
  var wdNames = ['周一','周二','周三','周四','周五','周六','周日'];
  if(wdMax > 0 && tasks.length > 7) insights.push('你最活跃的一天是 <b>' + wdNames[wdMaxIdx] + '</b>（' + wdMax + ' 次记录）');

  // Compare section
  var delta = todayTasks.length - yesterdayTasks.length;
  var deltaClass = delta > 0 ? 'up' : (delta < 0 ? 'down' : '');
  var deltaText = delta > 0 ? '↑ 比昨天多 ' + delta + ' 条' : (delta < 0 ? '↓ 比昨天少 ' + Math.abs(delta) + ' 条' : '与昨天持平');

  el.innerHTML = '<div class="' + (_firstRender ? 'anim ' : '') + 'today-wrap">'
    + '<div class="today-header">'
    + '<h2>' + today.replace(/-/g, '/') + ' · 今天</h2>'
    + '<div class="today-streak">'
    + '<span class="streak-dot ' + (todayChecked ? 'done' : 'pending') + '"></span>'
    + '<span>' + (todayChecked ? '已打卡' : '尚未打卡') + ' · 连续 ' + streak + ' 天</span>'
    + '</div></div>'

    // Today's reminders (highest priority - shown right after header)
    + (function(){
      var todayReminds = tasks.filter(function(t){ return t.remindDate === today; }).sort(function(a,b){ return (b.createdAt || '').localeCompare(a.createdAt || ''); });
      var overdueReminds = tasks.filter(function(t){ return t.remindDate && t.remindDate < today; }).sort(function(a,b){ return a.remindDate.localeCompare(b.remindDate); });
      // 过期超过 7 天的自动清除提醒
      var expired = tasks.filter(function(t){ return t.remindDate && diffDays(t.remindDate, today) > 7; });
      if(expired.length){
        var expiredIds = {};
        expired.forEach(function(t){ expiredIds[t.id] = true; });
        tasks.forEach(function(t){ if(expiredIds[t.id]) t.remindDate = null; });
        persistNow();
        toast('已自动清除 ' + expired.length + ' 个过期超过 7 天的提醒', 'info');
      }
      overdueReminds = overdueReminds.filter(function(t){ return diffDays(t.remindDate, today) <= 7; });
      if(!todayReminds.length && !overdueReminds.length) return '';
      var html = '<div class="today-remind">';
      if(todayReminds.length){
        html += '<h3>🔔 今日提醒 <span class="ts-badge">' + todayReminds.length + '</span></h3>';
        todayReminds.forEach(function(t){
          html += '<div class="today-remind-item" data-edit-remind="' + t.id + '">'
            + '<span class="tr-cat" style="border-color:' + catColor(t.category) + ';color:' + catColor(t.category) + '">' + catIcon(t.category) + ' ' + catName(t.category) + '</span>'
            + '<span class="tr-name">' + esc(t.name) + '</span>'
            + (t.note ? '<span class="tr-note">' + esc(t.note.substring(0, 30)) + '</span>' : '')
            + '</div>';
        });
      }
      if(overdueReminds.length){
        html += '<div style="margin-top:' + (todayReminds.length ? '10px' : '0') + '"><h3>⚠️ 已过期提醒 <span class="ts-badge" style="background:var(--red-glow);color:var(--red)">' + overdueReminds.length + '</span></h3>';
        overdueReminds.forEach(function(t){
          html += '<div class="today-remind-overdue">'
            + '<span style="color:var(--text-sec)">' + catIcon(t.category) + ' ' + esc(t.name) + '</span>'
            + '<span style="margin-left:auto;font-size:.68rem">原定 ' + t.remindDate + '</span>'
            + '</div>';
        });
        html += '</div>';
      }
      html += '</div>';
      return html;
    })()

    // Quick add
    + (quickTasks.length ? '<div class="today-quick">'
      + quickTasks.map(function(t){
        return '<button class="today-quick-item" data-quick-name="' + esc(t.name) + '" data-quick-cat="' + t.category + '">'
          + catIcon(t.category) + ' ' + esc(t.name) + '</button>';
      }).join('')
      + '</div>' : '')

    // Compare cards
    + '<div class="today-compare">'
    + '<div class="tc-card"><div class="tc-label">今天</div><div class="tc-value">' + todayTasks.length + '</div><div class="tc-sub">条记录</div></div>'
    + '<div class="tc-card"><div class="tc-label">昨天</div><div class="tc-value">' + yesterdayTasks.length + '</div><div class="tc-sub">条记录</div>'
    + '<div class="tc-delta ' + deltaClass + '">' + deltaText + '</div></div>'
    + '</div>'

    // Insights
    + insights.map(function(ins){ return '<div class="today-insight"><span class="ti-icon">💡</span><span>' + ins + '</span></div>'; }).join('')

    // Stale warnings (超过 30 天的折叠，只显示数量)
    + (function(){
      if(!staleGroups.length) return '';
      var recent = staleGroups.filter(function(sg){ return sg.days <= 30; });
      var ancient = staleGroups.filter(function(sg){ return sg.days > 30; });
      var html = '<div class="today-stale"><b>⏳ 长时间未记录的分组：</b>';
      recent.forEach(function(sg){
        html += '<div class="today-stale-item">' + sg.icon + ' ' + esc(sg.name) + '（' + sg.days + ' 天前）</div>';
      });
      if(ancient.length){
        html += '<div class="today-stale-item" style="cursor:pointer;color:var(--text-muted)" id="stale-toggle">还有 <b>' + ancient.length + ' 个</b> 超过 30 天的分组 ▾</div>';
        html += '<div id="stale-ancient" style="display:none">';
        ancient.forEach(function(sg){
          html += '<div class="today-stale-item">' + sg.icon + ' ' + esc(sg.name) + '（' + sg.days + ' 天前）</div>';
        });
        html += '</div>';
      }
      html += '<div style="margin-top:8px"><button class="btn" style="font-size:.72rem;padding:4px 10px" id="stale-cleanup-btn">🧹 清理不活跃的分组</button></div>';
      html += '</div>';
      return html;
    })()

    // Today's records
    + '<div class="today-section"><h3>今天的记录 <span class="ts-badge">' + todayTasks.length + '</span></h3>'
    + (todayTasks.length === 0 ? '<div class="empty"><div class="ei">📝</div><p>今天还没有记录<br>点击 ＋ 或用下方快捷按钮开始</p></div>'
      : todayTasks.map(function(t){
        var hasNote = t.note && t.note.trim().length > 0;
        return '<div class="te">'
          + '<span class="tt">' + (t.createdAt ? t.createdAt.slice(11, 16) : '') + '</span>'
          + '<span class="tc" style="border-color:' + catColor(t.category) + ';color:' + catColor(t.category) + '">' + catIcon(t.category) + ' ' + catName(t.category) + '</span>'
          + '<span class="tn">' + esc(t.name) + '</span>'
          + (hasNote ? '<button class="tnote-toggle tnote-toggle-sm" data-toggle-note="' + t.id + '" title="展开备注">📝</button>' : '')
          + '<div class="tactions">'
          + '<button class="tact" data-edit="' + t.id + '" title="编辑">✏️</button>'
          + '<button class="tact del" data-del="' + t.id + '" title="删除">✕</button>'
          + '</div></div>'
          + (hasNote ? '<div class="tnote-body" id="note-' + t.id + '" style="display:none"><div class="tnote-content">' + renderNoteMd(t.note) + '</div><button class="tnote-edit-btn" data-inline-note="' + t.id + '" title="编辑备注">✏️ 编辑</button></div>' : '');
      }).join(''))
    + '</div></div>';

  // Bind quick-add buttons
  el.querySelectorAll('.today-quick-item').forEach(function(btn){
    btn.addEventListener('click', function(){ openModal(null, today, btn.dataset.quickName); mCat.value = btn.dataset.quickCat; });
  });
  // Bind reminder items (click to edit)
  el.querySelectorAll('[data-edit-remind]').forEach(function(btn){
    btn.addEventListener('click', function(){ openModal(btn.dataset.editRemind); });
  });
  // Bind edit/delete
  el.querySelectorAll('[data-edit]').forEach(function(b){
    b.addEventListener('click', function(e){ e.stopPropagation(); openModal(b.dataset.edit); });
  });
  el.querySelectorAll('[data-del]').forEach(function(b){
    b.addEventListener('click', function(e){
      e.stopPropagation();
      var t = tasks.find(function(x){ return x.id === b.dataset.del; });
      confirmDelete('record', b.dataset.del, t ? '「' + t.name + '」(' + t.date + ')' : '此记录');
    });
  });
  bindNoteInteractions(el);

  // Bind stale group toggle & cleanup
  var staleToggle = document.getElementById('stale-toggle');
  if(staleToggle){
    staleToggle.addEventListener('click', function(){
      var anc = document.getElementById('stale-ancient');
      if(anc){ var vis = anc.style.display !== 'none'; anc.style.display = vis ? 'none' : 'block'; staleToggle.innerHTML = staleToggle.innerHTML.replace(/[▾▸]/, vis ? '▸' : '▾'); }
    });
  }
  var staleCleanupBtn = document.getElementById('stale-cleanup-btn');
  if(staleCleanupBtn){
    staleCleanupBtn.addEventListener('click', function(){
      var inactive = groups.filter(function(g){
        var gt = tasks.filter(function(t){ return t.groupId === g.id; });
        return gt.length >= 2 && diffDays(gt.sort(function(a,b){ return b.date.localeCompare(a.date); })[0].date, todayStr()) >= 7;
      });
      if(!inactive.length) return;
      var names = inactive.map(function(g){ return g.name; }).join('、');
      confirmCallback = null;
      cBody.innerHTML = '将删除 <b>' + inactive.length + ' 个</b>不活跃分组及其所有记录：<br><b>' + esc(names) + '</b><br><br>分组内的记录也会一并删除。<span style="color:var(--text-muted)"><br>删除后可通过撤销恢复。</span>';
      cOk.textContent = '确认删除';
      cOk.disabled = false;
      confirmNeedsTyping = false;
      cInputWrap.style.display = 'none';
      confirmBg.classList.add('open');
      confirmCallback = function(){
        var removedGroups = [];
        var removedTasks = [];
        inactive.forEach(function(g){
          var gTasks = tasks.filter(function(t){ return t.groupId === g.id; });
          removedGroups.push(g);
          removedTasks = removedTasks.concat(gTasks);
        });
        var removedGroupIds = Array.from(new Set(inactive.map(function(g){ return g.id; })));
        var removedTaskIds = removedTasks.map(function(t){ return t.id; });
        addTombstones('group', removedGroupIds);
        addTombstones('task', removedTaskIds);
        tasks = tasks.filter(function(t){ return !removedGroupIds.includes(t.groupId); });
        groups = groups.filter(function(g){ return !removedGroupIds.includes(g.id); });
        invalidateDateSet();
        persist();
        toast('已清理 ' + inactive.length + ' 个分组（' + removedTasks.length + ' 条记录）', 'warn', function(){
          removedGroups.forEach(function(g){ groups.push(g); });
          removedTasks.forEach(function(t){ tasks.push(t); });
          invalidateDateSet();
          persist();
          renderMain();
          toast('已恢复 ' + removedGroups.length + ' 个分组', 'ok');
        });
        renderMain();
      };
    });
  }
}

// ========== CALENDAR ==========
function renderCalendar(el){
  var ms = startOfMonth(currentMonth), me = endOfMonth(ms), cs = startOfWeek(ms), ce = endOfWeek(me);
  var days = eachDay(cs, ce), wds = ['一','二','三','四','五','六','日'];
  // [P2 FIX] Pre-build date→tasks map once
  var tmap = {};
  tasks.forEach(function(t){ if(!tmap[t.date]) tmap[t.date] = []; tmap[t.date].push(t); });
  // Pre-build remindDate map
  var rmap = {};
  tasks.forEach(function(t){ if(t.remindDate){ if(!rmap[t.remindDate]) rmap[t.remindDate] = []; rmap[t.remindDate].push(t); } });
  var dayTasks = (tmap[selectedDate] || []).sort(function(a,b){ return (b.createdAt || '').localeCompare(a.createdAt || ''); });
  var months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  el.innerHTML = '<div class="' + (_firstRender ? 'anim ' : '') + '">'
    + '<div class="cal-head"><h2 class="cal-title" id="cal-t">' + currentMonth.getFullYear() + '年 ' + months[currentMonth.getMonth()] + '</h2>'
    + '<div class="cal-nav"><button id="pm">‹</button><button id="tm" title="今天">●</button><button id="nm">›</button></div></div>'
    + '<div class="cal-grid">'
    + wds.map(function(w){ return '<div class="cal-wd">' + w + '</div>'; }).join('')
    + days.map(function(d){
      var ds = fmtDate(d); var dt = tmap[ds] || []; var has = dt.length > 0;
      var dr = rmap[ds] || []; var hasRemind = dr.length > 0;
      var colors = [...new Set(dt.map(function(t){ return catColor(t.category); }))];
      var tip = '';
      if(has || hasRemind){
        // Group by category for tooltip
        var catCounts = {};
        dt.forEach(function(t){ catCounts[t.category] = (catCounts[t.category] || 0) + 1; });
        tip = '<div class="cal-tip"><div class="ct-title">' + ds + (dt.length ? ' · ' + dt.length + '条记录' : '') + (hasRemind ? ' · 🔔' + dr.length + '条提醒' : '') + '</div>'
          + (dt.length ? Object.keys(catCounts).map(function(cid){ return '<div class="ct-item">' + catIcon(cid) + ' ' + catName(cid) + ' ' + catCounts[cid] + '条</div>'; }).join('') : '')
          + (hasRemind ? dr.map(function(t){ return '<div class="ct-item" style="color:var(--accent)">🔔 ' + esc(t.name) + '</div>'; }).join('') : '')
          + '</div>';
      }
      return '<div class="cal-day ' + (isSameMonth(d, currentMonth) ? '' : 'oth') + ' ' + (isToday(d) ? 'today' : '') + ' ' + (ds === selectedDate ? 'sel' : '') + ' ' + ((has || hasRemind) ? 'has' : '') + '" data-d="' + ds + '"><span class="dn">' + d.getDate() + (hasRemind ? '<span style="font-size:.5rem;vertical-align:super;margin-left:1px">🔔</span>' : '') + '</span>' + (has ? '<div class="dd">' + colors.slice(0,4).map(function(c){ return '<i style="background:' + c + '"></i>'; }).join('') + '</div>' : '') + tip + '</div>';
    }).join('')
    + '</div>'
    + '<div class="day-detail"><div class="dh"><h3>📋 ' + selectedDate.replace(/-/g, '/') + ' 的记录</h3><span style="font-size:.68rem;color:var(--text-muted)">' + dayTasks.length + ' 条</span></div><div class="db">'
    + (dayTasks.length === 0 ? '<div class="empty"><div class="ei">📝</div><p>这一天还没有记录<br>点击右下角 ＋ 或按 <b>Ctrl+N</b> 添加</p></div>' : dayTasks.map(function(t){
      var hasNote = t.note && t.note.trim().length > 0;
      var hasRemind = t.remindDate && t.remindDate === selectedDate;
      var hasFutureRemind = t.remindDate && t.remindDate !== selectedDate;
      return '<div class="te">'
        + '<span class="tt">' + (t.createdAt ? t.createdAt.slice(11, 16) : '') + '</span>'
        + '<span class="tc" style="border-color:' + catColor(t.category) + ';color:' + catColor(t.category) + '">' + catIcon(t.category) + ' ' + catName(t.category) + '</span>'
        + '<span class="tn">' + esc(t.name) + (hasRemind ? ' <span style="font-size:.6rem;color:var(--accent)">🔔 提醒</span>' : '') + (hasFutureRemind ? ' <span style="font-size:.6rem;color:var(--text-muted)">🔔 ' + t.remindDate + '</span>' : '') + '</span>'
        + (hasNote ? '<button class="tnote-toggle tnote-toggle-sm" data-toggle-note="' + t.id + '" title="展开备注">📝</button>' : '')
        + '<div class="tactions">'
        + '<button class="tact" data-edit="' + t.id + '" title="编辑">✏️</button>'
        + '<button class="tact del" data-del="' + t.id + '" title="删除">✕</button>'
        + '</div></div>'
        + (hasNote ? '<div class="tnote-body" id="note-' + t.id + '" style="display:none"><div class="tnote-content">' + renderNoteMd(t.note) + '</div><button class="tnote-edit-btn" data-inline-note="' + t.id + '" title="编辑备注">✏️ 编辑</button></div>' : '');
    }).join(''))
    + '</div></div></div>';

  document.getElementById('tm').addEventListener('click', function(){
    if(isSameMonth(currentMonth, new Date()) && selectedDate === todayStr()){
      var ct = document.getElementById('cal-t');
      ct.classList.add('flash');
      setTimeout(function(){ ct.classList.remove('flash'); }, 600);
      var todayCell = el.querySelector('.cal-day.today');
      if(todayCell){ todayCell.style.transition = 'all .3s'; todayCell.style.background = 'var(--accent-glow)'; setTimeout(function(){ todayCell.style.background = ''; }, 800); }
    } else {
      currentMonth = new Date(); selectedDate = todayStr(); renderMain();
    }
  });
  document.getElementById('pm').addEventListener('click', function(){ currentMonth = subDays(startOfMonth(currentMonth), 1); renderMain(); });
  document.getElementById('nm').addEventListener('click', function(){ currentMonth = addDays(endOfMonth(currentMonth), 1); renderMain(); });
  el.querySelectorAll('.cal-day').forEach(function(d){
    d.addEventListener('click', function(e){ if(e.target.closest('.cal-tip')) return; selectedDate = d.dataset.d; renderMain(); });
  });
  el.querySelectorAll('[data-edit]').forEach(function(b){
    b.addEventListener('click', function(e){ e.stopPropagation(); openModal(b.dataset.edit); });
  });
  el.querySelectorAll('[data-del]').forEach(function(b){
    b.addEventListener('click', function(e){
      e.stopPropagation();
      var t = tasks.find(function(x){ return x.id === b.dataset.del; });
      confirmDelete('record', b.dataset.del, t ? '「' + t.name + '」(' + t.date + ')' : '此记录');
    });
  });
  bindNoteInteractions(el);
}

// ========== TASKS VIEW ==========
function renderTasks(el){
  var filtered = filterCat === 'all' ? tasks.slice() : tasks.filter(function(t){ return t.category === filterCat; });
  var today = todayStr();
  if(taskTimeFilter === 'today') filtered = filtered.filter(function(t){ return t.date === today; });
  else if(taskTimeFilter === 'week'){ var ws = fmtDate(subDays(new Date(), 6)); filtered = filtered.filter(function(t){ return t.date >= ws; }); }
  else if(taskTimeFilter === 'month'){ var ms = fmtDate(subDays(new Date(), 29)); filtered = filtered.filter(function(t){ return t.date >= ms; }); }
  else if(taskTimeFilter === 'custom' && dateRangeFrom && dateRangeTo){
    filtered = filtered.filter(function(t){ return t.date >= dateRangeFrom && t.date <= dateRangeTo; });
  }

  if(sortBy === 'date-desc') filtered.sort(function(a,b){ return b.date.localeCompare(a.date) || (b.createdAt || '').localeCompare(a.createdAt || ''); });
  else if(sortBy === 'date-asc') filtered.sort(function(a,b){ return a.date.localeCompare(b.date) || (a.createdAt || '').localeCompare(b.createdAt || ''); });
  else if(sortBy === 'name-asc') filtered.sort(function(a,b){ return a.name.localeCompare(b.name); });
  else if(sortBy === 'cat') filtered.sort(function(a,b){ return a.category.localeCompare(b.category) || b.date.localeCompare(a.date); });

  var total = filtered.length;
  var paged = filtered.slice(tasksPage * TASKS_PER_PAGE, (tasksPage + 1) * TASKS_PER_PAGE);
  var _tsSearchVal = '';
  var hasMore = (tasksPage + 1) * TASKS_PER_PAGE < total;

  el.innerHTML = '<div class="' + (_firstRender ? 'anim ' : '') + '">'
    + '<div class="tv-head"><h2>所有记录 <span style="font-size:.72rem;color:var(--text-muted)" id="ts-count">' + total + ' 条</span></h2>'
    + '<div class="tv-controls">'
    + '<div class="view-toggle"><button class="' + (taskViewMode==='flat'?'on':'') + '" data-vm="flat">列表</button><button class="' + (taskViewMode==='grouped'?'on':'') + '" data-vm="grouped">分组</button></div>'
    + '<button class="btn ' + (batchMode?'btn-danger':'') + '" id="ts-batch" style="font-size:.7rem;padding:5px 10px">' + (batchMode ? '✕ 退出批量' : '☑ 批量') + '</button>'
    + '<div class="search"><span class="si">⌕</span><input placeholder="搜索..." id="ts-search"></div>'
    + '<select class="fi" id="ts-sort">'
    + '<option value="date-desc"' + (sortBy==='date-desc'?' selected':'') + '>最新优先</option>'
    + '<option value="date-asc"' + (sortBy==='date-asc'?' selected':'') + '>最早优先</option>'
    + '<option value="name-asc"' + (sortBy==='name-asc'?' selected':'') + '>按名称</option>'
    + '<option value="cat"' + (sortBy==='cat'?' selected':'') + '>按分类</option>'
    + '</select></div></div>'
    + '<div class="time-chips">'
    + ['all','today','week','month'].map(function(f){
      var labels = {all:'全部',today:'今天',week:'近7天',month:'近30天'};
      return '<button class="time-chip ' + (taskTimeFilter===f?'on':'') + '" data-tf="' + f + '">' + labels[f] + '</button>';
    }).join('')
    + '<button class="time-chip ' + (taskTimeFilter==='custom'?'on':'') + '" data-tf="custom">自定义</button>'
    + (taskTimeFilter === 'custom' ? '<input type="date" class="fi" id="ts-date-from" value="' + (dateRangeFrom || fmtDate(subDays(new Date(), 7))) + '" style="padding:3px 6px;font-size:.68rem;width:auto">'
      + '<span style="font-size:.68rem;color:var(--text-muted)">至</span>'
      + '<input type="date" class="fi" id="ts-date-to" value="' + (dateRangeTo || todayStr()) + '" style="padding:3px 6px;font-size:.68rem;width:auto">' : '')
    + '</div>'
    + (batchMode && batchSelected.size > 0 ? '<div class="group-confirm show"><span>已选 <b>' + batchSelected.size + '</b> 条记录</span><button id="ts-batch-del">删除选中</button><button id="ts-batch-clear">取消选择</button></div>' : '')
    + '<div id="ts-list"></div>'
    + (hasMore && taskViewMode === 'flat' ? '<div class="tl-footer" id="ts-more-wrap"><button id="ts-more">加载更多（' + (total - (tasksPage+1)*TASKS_PER_PAGE) + ' 条）</button></div>' : '<div class="tl-footer" id="ts-more-wrap" style="display:none"><button id="ts-more">加载更多</button></div>')
    + '</div>';

  el.querySelectorAll('[data-vm]').forEach(function(b){
    b.addEventListener('click', function(){ taskViewMode = b.dataset.vm; tasksPage = 0; renderMain(); });
  });
  el.querySelectorAll('[data-tf]').forEach(function(b){
    b.addEventListener('click', function(){
      taskTimeFilter = b.dataset.tf;
      if(b.dataset.tf === 'custom'){ dateRangeFrom = fmtDate(subDays(new Date(), 7)); dateRangeTo = todayStr(); }
      tasksPage = 0; renderMain();
    });
  });
  document.getElementById('ts-sort').addEventListener('change', function(){ sortBy = this.value; tasksPage = 0; renderMain(); });

  // Batch mode toggle
  var batchBtn = document.getElementById('ts-batch');
  if(batchBtn) batchBtn.addEventListener('click', function(){
    batchMode = !batchMode;
    if(!batchMode) batchSelected.clear();
    renderMain();
  });
  // Batch actions
  var batchDelBtn = document.getElementById('ts-batch-del');
  if(batchDelBtn) batchDelBtn.addEventListener('click', function(){
    var count = batchSelected.size;
    if(!count) return;
    // Confirm before batch delete
    var ids = Array.from(batchSelected);
    closeModal(); // close any open modal
    cBody.innerHTML = '确定要删除选中的 <b>' + count + '</b> 条记录吗？<br>删除后 4 秒内可撤销。';
    cOk.textContent = '确认删除';
    cOk.disabled = false;
    cInputWrap.style.display = 'none';
    confirmBg.classList.add('open');
      confirmCallback = function(){
        // Save removed items for undo
        var removedItems = [];
        var removedGroups = [];
        ids.forEach(function(id){
          var idx = tasks.findIndex(function(t){ return t.id === id; });
          if(idx !== -1){
            var removed = tasks.splice(idx, 1)[0];
            removedItems.push(removed);
            if(removed.groupId){
              var rg = groups.find(function(g){ return g.id === removed.groupId; });
              if(rg && !removedGroups.some(function(x){ return x.id === rg.id; })) removedGroups.push(rg);
            }
          }
        });
        addTombstones('task', ids);
        batchSelected.clear();
        cleanEmptyGroups();
        invalidateDateSet();
        persist();
      toast('已删除 ' + removedItems.length + ' 条记录', 'warn', function(){
        removedItems.forEach(function(t){ tasks.push(t); });
        removedGroups.forEach(function(g){
          if(!groups.find(function(x){ return x.id === g.id; })) groups.push(g);
        });
        invalidateDateSet();
        persist();
        renderMain();
        toast('已恢复 ' + removedItems.length + ' 条记录', 'ok');
      });
      renderMain();
    };
  });
  var batchClearBtn = document.getElementById('ts-batch-clear');
  if(batchClearBtn) batchClearBtn.addEventListener('click', function(){ batchSelected.clear(); renderMain(); });
  // Custom date range inputs
  var dateFromEl = document.getElementById('ts-date-from');
  var dateToEl = document.getElementById('ts-date-to');
  if(dateFromEl) dateFromEl.addEventListener('change', function(){ dateRangeFrom = this.value; tasksPage = 0; renderMain(); });
  if(dateToEl) dateToEl.addEventListener('change', function(){ dateRangeTo = this.value; tasksPage = 0; renderMain(); });

  var tsList = document.getElementById('ts-list');
  var tsSearch = document.getElementById('ts-search');

  function renderList(q){
    _tsSearchVal = q || '';
    if(taskViewMode === 'flat') renderFlatList(tsList, filtered, q, paged, total);
    else renderGroupedList(tsList, filtered, q);
    // Update "load more" button visibility based on actual display total
    var moreBtn = document.getElementById('ts-more');
    var moreWrap = document.getElementById('ts-more-wrap');
    if(moreWrap){
      var showMore = !_tsSearchVal && taskViewMode === 'flat' && (tasksPage + 1) * TASKS_PER_PAGE < total;
      moreWrap.style.display = showMore ? '' : 'none';
    }
  }

  tsSearch.addEventListener('input', function(){ tasksPage = 0; renderList(tsSearch.value.toLowerCase().trim()); });
  renderList('');

  var moreBtnWrap = document.getElementById('ts-more-wrap');
  if(moreBtnWrap) moreBtnWrap.addEventListener('click', function(e){
    if(e.target.id === 'ts-more'){ tasksPage++; renderMain(); }
  });
}

function renderFlatList(container, filtered, q, paged, total){
  var list = paged;
  var displayTotal = total;
  if(q){
    var searchResults = filtered.filter(function(t){ return t.name.toLowerCase().includes(q) || (t.note || '').toLowerCase().includes(q); });
    displayTotal = searchResults.length;
    list = searchResults.slice(tasksPage * TASKS_PER_PAGE, (tasksPage + 1) * TASKS_PER_PAGE);
  }
  var countEl = document.getElementById('ts-count');
  if(countEl) countEl.textContent = displayTotal + ' 条';
  if(!list.length){ container.innerHTML = '<div class="empty"><div class="ei">📋</div><p>' + (q ? '没有找到匹配' : '暂无记录') + '</p></div>'; return; }
  container.innerHTML = list.map(function(t){
    var hasNote = t.note && t.note.trim().length > 0;
    var checked = batchSelected.has(t.id);
    return '<div class="tl-item">'
      + (batchMode ? '<input type="checkbox" class="batch-cb" data-bid="' + t.id + '"' + (checked ? ' checked' : '') + ' style="cursor:pointer;flex-shrink:0">' : '')
      + '<div style="display:flex;flex-direction:column;min-width:72px"><span class="tl-date">' + t.date + '</span><span class="tl-ago">' + humanAgo(t.date) + '</span></div>'
      + '<span class="tl-cat" style="border-color:' + catColor(t.category) + ';color:' + catColor(t.category) + '">' + catIcon(t.category) + ' ' + catName(t.category) + '</span>'
      + '<span class="tl-name">' + esc(t.name) + (t.remindDate ? ' <span style="font-size:.6rem;color:var(--accent)">🔔 ' + t.remindDate + '</span>' : '') + '</span>'
      + (hasNote ? '<button class="tnote-toggle" data-toggle-note="' + t.id + '" title="展开备注">📝</button>' : '')
      + '<div class="tl-actions">'
      + '<button class="tl-act" data-edit="' + t.id + '" title="编辑">✏️</button>'
      + '<button class="tl-act del" data-del="' + t.id + '" title="删除">✕</button>'
      + '</div></div>'
      + (hasNote ? '<div class="tnote-body" id="note-' + t.id + '" style="display:none"><div class="tnote-content">' + renderNoteMd(t.note) + '</div><button class="tnote-edit-btn" data-inline-note="' + t.id + '" title="编辑备注">✏️ 编辑</button></div>' : '');
  }).join('');
  container.querySelectorAll('[data-edit]').forEach(function(b){ b.addEventListener('click', function(){ openModal(b.dataset.edit); }); });
  container.querySelectorAll('[data-del]').forEach(function(b){
    b.addEventListener('click', function(){
      var t = tasks.find(function(x){ return x.id === b.dataset.del; });
      confirmDelete('record', b.dataset.del, t ? '「' + t.name + '」(' + t.date + ')' : '此记录');
    });
  });
  // Batch checkbox handlers
  container.querySelectorAll('.batch-cb').forEach(function(cb){
    cb.addEventListener('change', function(){
      var prevSize = batchSelected.size;
      if(cb.checked) batchSelected.add(cb.dataset.bid);
      else batchSelected.delete(cb.dataset.bid);
      // Re-render when bar needs to appear/disappear (size crosses 0 threshold)
      if(prevSize === 0 || batchSelected.size === 0){ renderMain(); return; }
      // Otherwise just update the count in-place
      var bar = document.querySelector('.group-confirm.show b');
      if(bar) bar.textContent = batchSelected.size;
    });
  });
  bindNoteInteractions(container);
}

function renderGroupedList(container, filtered, q){
  // [PERF] Pre-build group→tasks map once (O(n)) instead of repeated filter (O(n×m))
  var groupTaskMap = {};
  filtered.forEach(function(t){
    if(t.groupId){
      if(!groupTaskMap[t.groupId]) groupTaskMap[t.groupId] = [];
      groupTaskMap[t.groupId].push(t);
    }
  });
  // Sort each group's tasks once
  for(var gid in groupTaskMap){
    groupTaskMap[gid].sort(function(a,b){ return b.date.localeCompare(a.date); });
  }
  function getGroupTasks(gid){ return groupTaskMap[gid] || []; }

  var fGroups = filterCat === 'all' ? groups : groups.filter(function(g){ return g.category === filterCat; });
  if(q){
    var searchMatchGroupIds = new Set();
    fGroups = fGroups.filter(function(g){
      var gt = getGroupTasks(g.id);
      var match = g.name.toLowerCase().includes(q) || gt.some(function(t){ return t.name.toLowerCase().includes(q) || (t.note || '').toLowerCase().includes(q); });
      if(match) searchMatchGroupIds.add(g.id);
      return match;
    });
    searchMatchGroupIds.forEach(function(id){ openGroups[id] = true; });
  }
  if(!fGroups.length){ container.innerHTML = '<div class="empty"><div class="ei">📋</div><p>' + (q ? '没有找到匹配' : '暂无任务分组') + '</p></div>'; return; }
  fGroups.sort(function(a,b){
    var al = getGroupTasks(a.id)[0];
    var bl = getGroupTasks(b.id)[0];
    return (bl ? bl.date : '').localeCompare(al ? al.date : '');
  });
  container.innerHTML = fGroups.map(function(gr){
    var gt = getGroupTasks(gr.id);
    var isOpen = openGroups[gr.id] !== false, cc = catColor(getGroupCategory(gr.id));
    var latest = gt[0], interval = latest && gt.length >= 2 ? '距上次 ' + humanInterval(diffDays(gt[1].date, latest.date)) : '';
    return '<div class="tg"><div class="tg-h ' + (isOpen?'open':'') + '" data-g="' + gr.id + '"><span class="tgd" style="background:' + cc + '"></span><span class="tgn">' + esc(gr.name) + '</span><span class="tgm">' + gt.length + ' 次</span>' + (interval ? '<span class="tgm">' + interval + '</span>' : '') + '<button class="tg-rename" data-rename="' + gr.id + '" title="重命名">✏️</button><span class="tga">›</span></div><div class="tg-b ' + (isOpen?'open':'') + '" data-b="' + gr.id + '">' + gt.map(function(t){
      var hasNote = t.note && t.note.trim().length > 0;
      return '<div class="tg-i"><span class="tgd2">' + t.date + '</span><span>' + esc(t.name) + (t.remindDate ? ' <span style="font-size:.6rem;color:var(--accent)">🔔</span>' : '') + '</span>' + (hasNote ? '<button class="tnote-toggle tnote-toggle-sm" data-toggle-note="' + t.id + '" title="展开备注">📝</button>' : '') + '<div style="margin-left:auto;display:flex;gap:3px;opacity:0;transition:opacity .15s" class="tg-actions"><button class="tact" data-edit="' + t.id + '" title="编辑" style="font-size:.68rem;background:none;border:none;cursor:pointer;color:var(--text-muted);padding:2px 4px;border-radius:3px">✏️</button><button class="tact del" data-del="' + t.id + '" title="删除" style="font-size:.68rem;background:none;border:none;cursor:pointer;color:var(--text-muted);padding:2px 4px;border-radius:3px">✕</button></div></div>'
        + (hasNote ? '<div class="tnote-body" id="note-' + t.id + '" style="display:none;padding:2px 14px 6px 86px"><div class="tnote-content">' + renderNoteMd(t.note) + '</div><button class="tnote-edit-btn" data-inline-note="' + t.id + '" title="编辑备注">✏️ 编辑</button></div>' : '');
    }).join('') + '</div></div>';
  }).join('');
  container.querySelectorAll('.tg-h').forEach(function(h){
    h.addEventListener('click', function(e){
      if(e.target.closest('.tg-rename')) return;
      var gid = h.dataset.g; openGroups[gid] = !(openGroups[gid] !== false); h.classList.toggle('open'); container.querySelector('[data-b="' + gid + '"]').classList.toggle('open');
    });
  });
  container.querySelectorAll('[data-rename]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var gid = btn.dataset.rename;
      var g = groups.find(function(g){ return g.id === gid; });
      if(g) openRenameModal(gid, g.name);
    });
  });
  container.querySelectorAll('[data-edit]').forEach(function(b){
    b.addEventListener('click', function(e){ e.stopPropagation(); openModal(b.dataset.edit); });
  });
  container.querySelectorAll('[data-del]').forEach(function(b){
    b.addEventListener('click', function(e){
      e.stopPropagation();

      confirmDelete('record', b.dataset.del, t ? '「' + t.name + '」(' + t.date + ')' : '此记录');

    item.addEventListener('mouseleave', function(){ var a = item.querySelector('.tg-actions'); if(a) a.style.opacity = '0'; });

}

// [IMPROVE #4] Stats insights
function renderStatsInsights(catData, weekData, dateMap){
  var insights = [];
  var today = todayStr();
  var totalDays = Object.keys(getDateSet()).length;

  // Week-over-week comparison (using shared helper)
  var wc = calcWeekCompare();
  if(wc.lastWeek > 0){
    var pct = Math.round((wc.thisWeek - wc.lastWeek) / wc.lastWeek * 100);
    if(pct > 0) insights.push('📈 本周记录量比上周多 <b>' + pct + '%</b>（' + wc.thisWeek + ' vs ' + wc.lastWeek + '）');
    else if(pct < 0) insights.push('📉 本周记录量比上周少 <b>' + Math.abs(pct) + '%</b>（' + wc.thisWeek + ' vs ' + wc.lastWeek + '）');
  }

  // Best weekday
  var maxW = 0, maxWi = 0;
  weekData.forEach(function(d,i){ if(d.value > maxW){ maxW = d.value; maxWi = i; } });
  if(maxW > 0) insights.push('📅 你最活跃的一天是 <b>' + weekData[maxWi].name + '</b>（共 ' + maxW + ' 次）');

  // Category balance: if one category dominates >70%
  var total = catData.reduce(function(s,d){ return s + d.value; }, 0);
  if(catData.length > 1 && total > 5){
    var topPct = Math.round(catData[0].value / total * 100);
    if(topPct > 70) insights.push('🎯 「' + catData[0].name + '」占比 <b>' + topPct + '%</b>，考虑拓展更多维度');
  }

  // Stale groups
  var staleCount = 0;
  groups.forEach(function(g){
    var gt = tasks.filter(function(t){ return t.groupId === g.id; }).sort(function(a,b){ return b.date.localeCompare(a.date); });
    if(gt.length >= 2 && diffDays(gt[0].date, today) >= 14) staleCount++;
  });
  if(staleCount > 0) insights.push('⏳ 有 <b>' + staleCount + '</b> 个任务已超过 14 天未记录');

  // Average daily
  if(totalDays > 3){
    var avg = (tasks.length / totalDays).toFixed(1);
    insights.push('📊 平均每天 <b>' + avg + '</b> 条记录');
  }

  if(!insights.length) return '';

  return '<div class="cc"><h4>📌 洞察</h4>'
    + insights.map(function(ins){ return '<div class="today-insight" style="margin-bottom:6px"><span>' + ins + '</span></div>'; }).join('')
    + '</div>';
}

// ========== STATS VIEW ==========
function renderStats(el){
  var totalDays = Object.keys(getDateSet()).length;
  var wdN = ['周一','周二','周三','周四','周五','周六','周日'], wdC = [0,0,0,0,0,0,0];
  tasks.forEach(function(t){ var d = parseDate(t.date); if(d) wdC[getDayIndex(d)]++; });
  var wdD = wdN.map(function(n,i){ return {name: n, value: wdC[i]}; });

  // [P2 FIX] Pre-build category and date maps
  var cm = {};
  tasks.forEach(function(t){ var n = catName(t.category); cm[n] = (cm[n] || 0) + 1; });
  var cd = Object.keys(cm).map(function(k){ return {name: k, value: cm[k]}; }).sort(function(a,b){ return b.value - a.value; });

  // Heatmap — end on Sunday of current week, start 12 weeks back (always Monday-aligned)
  var now = new Date();
  var hmEnd = addDays(now, 6 - getDayIndex(now)); // Sunday of this week
  var hmStartObj = subDays(hmEnd, 83);
  var hmDow = getDayIndex(hmStartObj);
  if(hmDow > 0) hmStartObj = subDays(hmStartObj, hmDow);
  // Build date→count map covering the ENTIRE heatmap range
  // YYYY-MM-DD 字符串比较等价于日期比较（左补零保证字典序正确）
  var hmStartStr = fmtDate(hmStartObj);
  var allDateMap = {};
  tasks.forEach(function(t){
    if(t.date >= hmStartStr) allDateMap[t.date] = (allDateMap[t.date] || 0) + 1;
  });
  // 30-day trend (uses allDateMap which now covers this range)
  var rd = eachDay(subDays(new Date(), 29), new Date());
  var rD = rd.map(function(d){
    var ds = fmtDate(d);
    return {name: (d.getMonth()+1) + '/' + d.getDate(), value: allDateMap[ds] || 0};
  });

  // Generate exactly 84 heatmap cells (12 weeks × 7 days), filling forward from Monday
  var hD = [];
  for(var hi = 0; hi < 84; hi++){
    var d = addDays(hmStartObj, hi);
    var ds = fmtDate(d);
    var c = allDateMap[ds] || 0;
    hD.push({date: ds, count: c, level: 0, day: d.getDay()});
  }
  // Dynamic heatmap level calculation based on actual data distribution
  var hmCounts = hD.map(function(c){ return c.count; });
  var hmMax = Math.max.apply(null, hmCounts);
  var hmMin = Math.min.apply(null, hmCounts.filter(function(c){ return c > 0; }));
  if(hmMax > 0){
    hD.forEach(function(cell){
      if(cell.count === 0){ cell.level = 0; return; }
      if(hmMin === hmMax){ cell.level = 2; return; } // all equal → mid-level
      var ratio = (cell.count - hmMin) / (hmMax - hmMin);
      if(ratio < 0.25) cell.level = 1;
      else if(ratio < 0.5) cell.level = 2;
      else if(ratio < 0.75) cell.level = 3;
      else cell.level = 4;
    });
  }

  el.innerHTML = '<div class="' + (_firstRender ? 'anim ' : '') + '">'
    + '<h2 style="font-family:\'DM Serif Display\',serif;font-size:1.3rem;margin-bottom:14px">数据统计</h2>'
    + '<div class="sg"><div class="sc"><h4>总记录数</h4><div class="sb">' + tasks.length + '</div><div class="ss">跨越 ' + totalDays + ' 天</div></div>'
    + '<div class="sc"><h4>当前连续</h4><div class="sb">' + calcStreak() + '</div><div class="ss">天</div></div>'
    + '<div class="sc"><h4>任务分组</h4><div class="sb">' + groups.length + '</div><div class="ss">类不同任务</div></div>'
    + '<div class="sc"><h4>最活跃</h4><div class="sb" style="font-size:1.5rem">' + (cd[0] ? cd[0].name : '-') + '</div><div class="ss">' + (cd[0] ? cd[0].value : 0) + ' 次</div></div></div>'
    + renderStatsInsights(cd, wdD, allDateMap)
    + '<div class="cc"><h4>近 30 天趋势</h4><canvas id="cr" height="200"></canvas></div>'
    + '<div class="sg" style="grid-template-columns:repeat(2,1fr)"><div class="cc"><h4>按星期分布</h4><canvas id="cw" height="200"></canvas></div><div class="cc"><h4>分类占比</h4><canvas id="cc2" height="200"></canvas></div></div>'
    + '<div class="cc"><h4>活动热力图（近 12 周）</h4>'
    + '<div class="heatmap-wrap"><div class="heatmap" id="hm-grid"></div></div>'
    + '<div class="hm-legend"><span>少</span>' + [0,1,2,3,4].map(function(l){ return '<div class="hm-c l' + l + '" style="width:10px;height:10px;aspect-ratio:unset"></div>'; }).join('') + '<span>多</span></div>'
    + '</div>'
    + '</div>';

  // Draw heatmap — 12 rows (weeks) × 7 cols (Mon-Sun), auto-flow:row
  // hD is chronological: hD[0]=Mon week1, hD[1]=Tue week1, ..., hD[7]=Mon week2...
  // Row flow places items left-to-right, top-to-bottom — matches perfectly
  var hmGrid = document.getElementById('hm-grid');
  if(hmGrid){
    var hmHtml = '';
    for(var hi = 0; hi < hD.length; hi++){
      var cell = hD[hi];
        hmHtml += '<div class="hm-c l' + cell.level + '" data-hm-date="' + cell.date + '" title="' + cell.date + ': ' + cell.count + ' 条">' + (cell.count > 0 ? cell.count : '') + '</div>';
      }
    hmGrid.innerHTML = hmHtml;
    hmGrid.querySelectorAll('.hm-c[data-hm-date]').forEach(function(cell){
      cell.style.cursor = 'pointer';
      cell.addEventListener('click', function(){
        selectedDate = cell.dataset.hmDate;
        currentMonth = parseDate(selectedDate);
        currentView = 'calendar';
        renderMain();
        toast('已跳转到 ' + selectedDate, 'info');
      });
    });
  }

  // [P3 FIX] Use requestAnimationFrame instead of setTimeout for chart drawing
  requestAnimationFrame(function(){
    if(document.getElementById('cr')) drawBar('cr', rD, '#d4a043', true);
    if(document.getElementById('cw')) drawBar('cw', wdD, '#5a8ab0', false);
    if(document.getElementById('cc2')) drawPie('cc2', cd);
  });
}

// ========== CANVAS CHARTS ==========
function gCC(){
  var cs = getComputedStyle(document.documentElement);
  return {
    accent: cs.getPropertyValue('--accent').trim(),
    border: cs.getPropertyValue('--border').trim(),
    muted: cs.getPropertyValue('--text-muted').trim(),
    text: cs.getPropertyValue('--text').trim(),
    bg: cs.getPropertyValue('--bg').trim()
  };
}

function drawBar(id, data, color, labels){
  var canvas = document.getElementById(id);
  if(!canvas) return;
  var ctx = canvas.getContext('2d'), dpr = window.devicePixelRatio || 1, rect = canvas.getBoundingClientRect();
  if(rect.width < 1) return;
  var h = parseInt(canvas.getAttribute('height')) || 200;
  canvas.width = rect.width * dpr; canvas.height = h * dpr; canvas.style.height = h + 'px'; ctx.scale(dpr, dpr);
  var w = rect.width, cc = gCC(), pad = {t:12, r:14, b:28, l:32}, cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;
  var maxV = Math.max.apply(null, data.map(function(d){ return d.value; })), barW = Math.max(2, (cw / data.length) - 2);
  if(maxV < 1) maxV = 1;
  ctx.clearRect(0, 0, w, h); ctx.strokeStyle = cc.border; ctx.lineWidth = 0.5;
  for(var i = 0; i <= 4; i++){
    var y = pad.t + (ch/4) * i;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
    ctx.fillStyle = cc.muted; ctx.font = '11px DM Mono'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxV - (maxV/4) * i), pad.l - 4, y + 3);
  }
  data.forEach(function(d, i){
    var x = pad.l + (cw/data.length) * i + (cw/data.length - barW)/2, barH = (d.value/maxV) * ch, y = pad.t + ch - barH, r = Math.min(3, barW/2);
    var grad = ctx.createLinearGradient(x, y, x, pad.t + ch); grad.addColorStop(0, color); grad.addColorStop(1, color + '40');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + barW - r, y); ctx.quadraticCurveTo(x + barW, y, x + barW, y + r); ctx.lineTo(x + barW, pad.t + ch); ctx.lineTo(x, pad.t + ch); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.fill();
    if(labels){ if(i % Math.max(1, Math.floor(data.length/10)) === 0){ ctx.fillStyle = cc.muted; ctx.font = '11px DM Mono'; ctx.textAlign = 'center'; ctx.fillText(d.name, x + barW/2, h - pad.b + 14); } }
    else { ctx.fillStyle = cc.muted; ctx.font = '12px DM Mono'; ctx.textAlign = 'center'; ctx.fillText(d.name, x + barW/2, h - pad.b + 14); }
  });
}

function drawPie(id, data){
  var canvas = document.getElementById(id);
  if(!canvas || !data.length) return;
  var ctx = canvas.getContext('2d'), dpr = window.devicePixelRatio || 1, rect = canvas.getBoundingClientRect();
  if(rect.width < 1) return;
  var h = parseInt(canvas.getAttribute('height')) || 200;
  canvas.width = rect.width * dpr; canvas.height = h * dpr; canvas.style.height = h + 'px'; ctx.scale(dpr, dpr);
  var w = rect.width, cc = gCC(), colors = ['#d4a043','#5a9a6a','#5a8ab0','#c07050','#8a6ab0','#c05080','#4a9a8a','#b08a40'];
  var total = data.reduce(function(s, d){ return s + d.value; }, 0), cx = w * 0.38, cy = h/2, outerR = Math.min(cx - 16, cy - 16), innerR = outerR * 0.55;
  ctx.clearRect(0, 0, w, h); var angle = -Math.PI / 2;
  data.forEach(function(d, i){
    var slice = (d.value / total) * Math.PI * 2;
    ctx.beginPath(); ctx.arc(cx, cy, outerR, angle, angle + slice); ctx.arc(cx, cy, innerR, angle + slice, angle, true); ctx.closePath();
    ctx.fillStyle = colors[i % colors.length]; ctx.fill(); angle += slice;
  });
  ctx.fillStyle = cc.text; ctx.font = '400 22px "DM Serif Display"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(total, cx, cy - 5);
  ctx.fillStyle = cc.muted; ctx.font = '12px DM Mono'; ctx.fillText('条记录', cx, cy + 12);
  var ly = h * 0.18, lx = w * 0.7;
  // [FIX #3] 动态计算图例间距，防止标签溢出 canvas
  var legendSpacing = Math.max(14, Math.min(20, (h * 0.72) / data.length));
  var maxLy = h - 10; // 画布底部留 10px 边距
  data.forEach(function(d, i){
    if(ly > maxLy) return; // 超出画布则截断
    ctx.fillStyle = colors[i % colors.length]; ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = cc.muted; ctx.font = '12px DM Mono'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    // 文字过长时截断
    var label = d.name + ' (' + d.value + ')';
    var maxLabelWidth = w - lx - 12;
    if(ctx.measureText(label).width > maxLabelWidth){
      label = d.name.slice(0, Math.floor(maxLabelWidth / 7)) + '…(' + d.value + ')';
    }
    ctx.fillText(label, lx + 8, ly);
    ly += legendSpacing;
  });
}

<script>

(function(){
  'use strict';

  // 兼容本地文件打开（file://）和服务器部署
  var _origin = window.location.origin;
  if(!_origin || _origin === 'null' || _origin === 'file://'){

    _origin = localStorage.getItem(cb.STORAGE_PREFIX + 'api_origin') || '';

  function updateButtonState(){

        setupBtn.style.color = '';

  // ─── 从 localStorage 读取当前数据 ───
  function getLocalData(){
    var tasks, groups;
    try {
      tasks = JSON.parse(localStorage.getItem(cb.STORAGE_PREFIX + 'tasks')) || [];
      groups = JSON.parse(localStorage.getItem(cb.STORAGE_PREFIX + 'groups')) || [];
    } catch(e){
      tasks = [];
      groups = [];
    }
    var tombstones;
    try {
      tombstones = JSON.parse(localStorage.getItem(cb.STORAGE_PREFIX + 'tombstones')) || {};
    } catch(e){ tombstones = {}; }
    return { tasks: tasks, groups: groups, tombstones: tombstones, version: cb.EXPORT_VERSION, syncedAt: new Date().toISOString() };
  }

  // ─── 将云端数据写入 localStorage + 同步内存状态 ───
  function setLocalData(data){
    if(!data) return;
    var changed = false;

    // 始终用云端数据覆盖（即使为空数组），避免残留旧数据
    var newTasks = JSON.stringify(data.tasks || []);
    var oldTasks = JSON.stringify(cb.tasks);
    if(newTasks !== oldTasks){
      localStorage.setItem(cb.STORAGE_PREFIX + 'tasks', newTasks);
      cb.tasks = data.tasks || [];
      changed = true;
    }

    var newGroups = JSON.stringify(data.groups || []);
    var oldGroups = JSON.stringify(cb.groups);
    if(newGroups !== oldGroups){
      localStorage.setItem(cb.STORAGE_PREFIX + 'groups', newGroups);
      cb.groups = data.groups || [];
      changed = true;
    }

    if(data.tombstones) localStorage.setItem(cb.STORAGE_PREFIX + 'tombstones', JSON.stringify(data.tombstones));
    // 合并后清理空分组（墓碑可能删掉了分组下所有任务）
    if(cb.cleanEmptyGroups) cb.cleanEmptyGroups();
    // 强制触发主应用重新渲染 + 存储缓存失效
    cb.invalidateDateSet();
    cb.invalidateStorageCache && cb.invalidateStorageCache();
    if(changed) cb.renderMain(); // 只在数据真正变化时才重渲染，避免无意义跳动
  }

  // ─── 合并策略：以 id 为主键 + 墓碑过滤 ───
  function mergeData(remote, local){
    var merged = { tasks: [], groups: [], tombstones: {} };

    // 合并双方墓碑（取较晚的时间戳）
    var localTbs = local.tombstones || {};
    var remoteTbs = remote.tombstones || {};
    var allKeys = Object.keys(localTbs).concat(Object.keys(remoteTbs));
    allKeys.forEach(function(k){
      merged.tombstones[k] = Math.max(localTbs[k] || 0, remoteTbs[k] || 0);
    });

    // 清理过期墓碑（使用统一常量 TOMBSTONE_MAX_AGE）
    var cutoff = Date.now() - cb.TOMBSTONE_MAX_AGE;
    Object.keys(merged.tombstones).forEach(function(k){
      if(merged.tombstones[k] < cutoff) delete merged.tombstones[k];
    });

    // Tasks 合并（跳过被墓碑标记的条目）
    var taskMap = {};
    (local.tasks || []).forEach(function(t){ taskMap[t.id] = t; });
    (remote.tasks || []).forEach(function(t){
      var existing = taskMap[t.id];
      if(!existing){
        taskMap[t.id] = t;
      } else {
        var localTime = existing.updatedAt || existing.createdAt || '';
        var remoteTime = t.updatedAt || t.createdAt || '';
        if(remoteTime > localTime) taskMap[t.id] = t;
      }
    });
    // 过滤：移除被墓碑标记的任务（for...in 兼容旧浏览器）
    var mergedTasks = [];
    for(var k in taskMap){
      if(taskMap.hasOwnProperty(k) && !merged.tombstones['task:' + taskMap[k].id]){
        mergedTasks.push(taskMap[k]);
      }
    }
    merged.tasks = mergedTasks;

    // Groups 合并（同样跳过墓碑标记）
    var groupMap = {};
    (local.groups || []).forEach(function(g){ groupMap[g.id] = g; });
    (remote.groups || []).forEach(function(g){
      var existing = groupMap[g.id];
      if(!existing){
        groupMap[g.id] = g;
      } else {
        var localTime = existing.updatedAt || existing.createdAt || '';
        var remoteTime = g.updatedAt || g.createdAt || '';
        if(remoteTime > localTime) groupMap[g.id] = g;
      }
    });
    var mergedGroups = [];
    for(var kg in groupMap){
      if(groupMap.hasOwnProperty(kg) && !merged.tombstones['group:' + groupMap[kg].id]){
        mergedGroups.push(groupMap[kg]);
      }
    }
    merged.groups = mergedGroups;

    return merged;
  }

  // ─── 拉取云端数据 ───
  async function pullFromCloud(){
    return pullFromCloudWithId(gistId);
  }

  // ─── 用指定 ID 拉取（绑定/验证时用）──
  // 返回值: { data, error } — data 为数据(可能为空对象), error 为错误信息(成功为 null)
  async function pullFromCloudWithId(id){
    if(!id) return { data: null, error: '未绑定云端' };
    try {
      var resp = await fetch(API + '/gist-read', {
        headers: { 'X-Gist-ID': id }
      });
      if(!resp.ok){
        var errText = await resp.text().catch(function(){ return resp.status; });
        console.warn('云端拉取失败:', resp.status, errText);
        return { data: null, error: '拉取失败: ' + resp.status };
      }
      var result = await resp.json();
      return { data: result.data || null, error: null };
    } catch(e){
      console.warn('云端拉取异常:', e);
      return { data: null, error: '网络异常: ' + e.message };
    }
  }

  // ─── 推送数据到云端 ───
  async function pushToCloud(data){
    if(!gistId) return false;
    try {
      var resp = await fetch(API + '/gist-write', {
        method: 'POST',
        headers: {
          'X-Gist-ID': gistId,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ data: data || getLocalData() })
      });
      return resp.ok;
    } catch(e){
      console.warn('云端推送异常:', e);
      return false;
    }
  }

  // ─── 创建新的 Gist ───
  async function createGist(){
    try {
      var resp = await fetch(API + '/gist-init', { method: 'POST' });
      if(!resp.ok) throw new Error('创建失败: ' + resp.status);
      var result = await resp.json();
      return result.gistId;
    } catch(e){
      throw e;
    }
  }

  // ─── 核心同步逻辑：拉取 -> 合并 -> 推送 ───
  async function doSync(){
    if(syncing) return;
    if(!gistId){
      cb.toast('未绑定云端，点击 🔗 按钮绑定', 'warn');
      return;
    }
    if(Date.now() < nextRetryTime) return;

    // [FIX] 离线检测：无网络时跳过同步
    if(typeof navigator !== 'undefined' && navigator.onLine === false){
      cb.toast('📡 当前离线，恢复网络后自动同步', 'info');
      return;
    }

    syncing = true;
    _suppressOnDataChanged = true; // 同步期间屏蔽回调，防止死循环
    var syncBtn = document.getElementById('cloud-sync-btn');
    if(syncBtn) syncBtn.style.opacity = '0.5';

    var syncOk = false;
    try {
      // 1. 先拉取云端数据
      var pullResult = await pullFromCloud();
      var remoteData = pullResult.data;
      var pullError = pullResult.error;

      // 如果拉取失败（非"云端无数据"），中止同步
      if(pullError && !remoteData){
        console.warn('doSync: 拉取失败，跳过本次同步 —', pullError);
        // 不设 nextRetryTime，让下次正常重试
        return; // ← finally 会清理状态
      }

      // 2. 拉取完成后再从内存读取最新本地数据
      var localData = {
        tasks: cb.tasks,
        groups: cb.groups,
        tombstones: JSON.parse(localStorage.getItem(cb.STORAGE_PREFIX + 'tombstones') || '{}'),
        version: cb.EXPORT_VERSION,
        syncedAt: new Date().toISOString()
      };
      var finalData = localData;

      if(remoteData){
        // 3. 合并数据
        finalData = mergeData(remoteData, localData);
        // 4. 更新本地存储和内存
        setLocalData(finalData);
      }

      // 5. 对比合并结果与云端数据，仅在有变化时才推送
      var needPush = _dataDirty; // 用户有主动修改，必须推
      if(!needPush && remoteData){
        var remoteNorm = JSON.stringify({ tasks: remoteData.tasks, groups: remoteData.groups, tombstones: remoteData.tombstones });
        var finalNorm = JSON.stringify({ tasks: finalData.tasks, groups: finalData.groups, tombstones: finalData.tombstones });
        needPush = (remoteNorm !== finalNorm);
      }
      if(!needPush && !remoteData){
        needPush = true; // 云端无数据，需要推送初始化
      }

      if(needPush){
        var pushOk = await pushToCloud(finalData);
        if(!pushOk){
          nextRetryTime = Date.now() + 5 * 60 * 1000;
          cb.toast('⏳ 推送失败，5分钟后重试', 'warn');
          return; // ← finally 会清理状态，但不置 syncOk
        }
      }

      // 全部成功
      nextRetryTime = 0;
      syncOk = true;
    } catch(e){
      cb.toast('同步异常: ' + e.message, 'warn');
    } finally {
      syncing = false;
      _suppressOnDataChanged = false; // 恢复回调
      if(syncOk) _dataDirty = false;  // 仅成功时才清脏标记
      if(syncBtn) syncBtn.style.opacity = '1';
    }
  }

  // ─── 手动从云端拉取（覆盖本地）──
  async function doPull(){
    if(!gistId){ cb.toast('未绑定云端', 'warn'); return; }
    if(typeof navigator !== 'undefined' && navigator.onLine === false){
      cb.toast('📡 当前离线，恢复网络后再试', 'warn'); return;
    }
    if(!confirm('从云端加载会覆盖本地数据，确定？')) return;
    try {
      cb.toast('正在加载...', 'info');
      var pullResult = await pullFromCloud();
      if(pullResult.error && !pullResult.data){
        cb.toast('❌ ' + pullResult.error, 'warn');
        return;
      }
      if(pullResult.data){
        var n = (pullResult.data.tasks || []).length;
        setLocalData(pullResult.data);
        cb.toast('☁️ 已从云端加载 ' + n + ' 条记录', 'ok');
      } else {
        cb.toast('云端暂无数据', 'info');
      }
    } catch(e){ cb.toast('加载失败: ' + e.message, 'warn'); }
  }

  // ─── 绑定/初始化云端 ───
  async function doSetup(){
    // 本地文件模式：先配置服务器地址
    if(!_origin || _origin === 'null' || _origin === 'file://' || _origin === ''){
      var savedOrigin = localStorage.getItem(cb.STORAGE_PREFIX + 'api_origin') || '';
      var serverUrl = prompt(
        '🌐 配置服务器地址\n\n' +
        '当前为本地文件模式，需先输入服务器地址才能同步：\n\n' +
        '（例如：https://your-server.com）',
        savedOrigin || 'https://'
      );
      if(!serverUrl || serverUrl.trim() === '' || serverUrl === 'https://'){
        cb.toast('未设置服务器地址', 'info');
        return;
      }
      serverUrl = serverUrl.trim().replace(/\/+$/, ''); // 去掉末尾斜杠
      localStorage.setItem(cb.STORAGE_PREFIX + 'api_origin', serverUrl);
      _origin = serverUrl;
      API = _origin + '/api';
      cb.toast('✅ 服务器地址已设置', 'ok');
    }

    if(gistId){
      // 已绑定，显示信息和操作选项
      var choice = prompt(
        '✅ 已绑定云端\n\nGist ID: ' + gistId + '\n\n' +
        '输入以下数字执行操作：\n' +
        '1 = 推送到云端\n' +
        '2 = 从云端加载（覆盖本地）\n' +
        '3 = 复制 Gist ID\n' +
        '4 = 解除绑定\n' +
        '取消 = 关闭',
        '1'
      );
      choice = (choice || '').trim();
      if(choice === '1'){
        doSync();
      } else if(choice === '2'){
        doPull();
      } else if(choice === '3'){
        try {
          await navigator.clipboard.writeText(gistId);
          cb.toast('📋 Gist ID 已复制到剪贴板', 'ok');
        } catch(e){
          prompt('请手动复制以下 Gist ID：', gistId);
        }
      } else if(choice === '4'){
        if(confirm('确定要解除云端绑定？\n（本地数据不会删除，只是断开云端连接）')){
          localStorage.removeItem(cb.STORAGE_PREFIX + 'cloud_gist_id');
          gistId = null;
          stopAutoSync(); // [FIX] 清除定时器，防止泄漏
          updateButtonState();
          cb.toast('已解除云端绑定', 'info');
        }
      }
      return;
    }

    // 未绑定：先询问是否已有 Gist ID
    var existingId = prompt(
      '🔗 绑定云端同步\n\n' +
      '如果你在其他设备已经绑定过云端，\n' +
      '请粘贴之前的 Gist ID：\n\n' +
      '（留空或点取消 = 创建新的云端空间）',
      ''
    );

    // 用户输入了 Gist ID，验证并绑定
    if(existingId !== null && existingId.trim() !== ''){
      existingId = existingId.trim();
      try {
        cb.toast('正在验证 Gist ID...', 'info');
        // 直接拉取数据来验证（复用 pullFromCloudWithId）
        var pullResult = await pullFromCloudWithId(existingId);
        if(pullResult.error && !pullResult.data){
          cb.toast('❌ 验证失败: ' + pullResult.error, 'warn');
          return;
        }
        // 验证通过，绑定
        gistId = existingId;
        localStorage.setItem(cb.STORAGE_PREFIX + 'cloud_gist_id', gistId);
        updateButtonState();
        if(pullResult.data){
          var n = (pullResult.data.tasks || []).length;
          setLocalData(pullResult.data);
          cb.toast('☁️ 已绑定并加载 ' + n + ' 条记录！', 'ok');
        } else {
          cb.toast('✅ 已绑定云端，但云端暂无数据', 'ok');
        }
        startAutoSync();
      } catch(e){
        cb.toast('验证失败: ' + e.message, 'warn');
      }
      return;
    }

    // 用户取消或留空，创建新 Gist
    try {
      cb.toast('正在创建云端空间...', 'info');
      var newId = await createGist();
      gistId = newId;
      localStorage.setItem(cb.STORAGE_PREFIX + 'cloud_gist_id', gistId);
      updateButtonState();

      // 首次同步：推送到云端
      var ok = await pushToCloud(getLocalData());
      if(ok){
        // 用 prompt 显示 Gist ID，方便用户复制
        prompt(
          '☁️ 云端绑定成功！\n\n请复制下面的 Gist ID，\n在其他设备上点 🔗 按钮时粘贴，即可同步数据：',
          gistId
        );
        cb.toast('☁️ 云端已就绪', 'ok');
      } else {
        prompt(
          'Gist 已创建但同步失败，请手动点击 ☁️\n\n请复制 Gist ID 备用：',
          gistId
        );
      }
      startAutoSync();
    } catch(e){
      cb.toast('绑定失败: ' + e.message, 'warn');
    }
  }

  // ─── 自动同步（每 10 分钟兜底） ───
  function startAutoSync(){
    if(autoSyncTimer) clearInterval(autoSyncTimer);
    autoSyncTimer = setInterval(function(){
      if(gistId && !syncing && Date.now() >= nextRetryTime) doSync();
    }, 1800000); // 30 分钟兜底，减少请求数
  }
  // [FIX] 停止自动同步（解绑时调用，防止定时器泄漏）
  function stopAutoSync(){
    if(autoSyncTimer){ clearInterval(autoSyncTimer); autoSyncTimer = null; }
    if(_syncDebounce){ clearTimeout(_syncDebounce); _syncDebounce = null; }
  }

  // ─── 用户数据变更时触发同步（由主应用 persist() 调用）──
  var _syncDebounce = null;
  var _dataDirty = false; // 数据是否有未同步的变更
  cb.onDataChanged = function(){
    if(_suppressOnDataChanged) return; // 同步期间不触发，防止死循环
    _dataDirty = true;
    if(_syncDebounce) clearTimeout(_syncDebounce);
    _syncDebounce = setTimeout(function(){
      if(gistId && !syncing && Date.now() >= nextRetryTime && _dataDirty) doSync();
    }, 10000); // 10 秒 debounce，减少高频操作的请求
  };

  // ─── 页面关闭/切后台时立即同步到云端 ───
  var _lastBeacon = 0;
  function syncBeacon(){
    if(!gistId) return;
    if(!_dataDirty) return; // 无变更不发送
    // 5 秒节流，防止切 App 风暴
    var now = Date.now();
    if(now - _lastBeacon < 5000) return;
    _lastBeacon = now;
    // beacon 前直接 flush 内存到 localStorage（不触发 onDataChanged 避免死循环）
    try {
      localStorage.setItem(cb.STORAGE_PREFIX + 'tasks', JSON.stringify(cb.tasks));
      localStorage.setItem(cb.STORAGE_PREFIX + 'groups', JSON.stringify(cb.groups));
    } catch(e){}
    var data = getLocalData();
    // 用 keepalive 保证页面关闭后请求仍能发出
    // 注意：不提前清 _dataDirty，让 doSync 以 syncOk 为准清理
    fetch(API + '/gist-write', {
      method: 'POST',
      headers: { 'X-Gist-ID': gistId, 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: data }),
      keepalive: true
    }).then(function(r){
      if(r.ok) _dataDirty = false; // 仅成功时才清
    }).catch(function(){});
  }
  // 页面关闭时
  window.addEventListener('beforeunload', syncBeacon);
  // 页面切后台时：隐藏超过 30 秒且有变更时才同步，避免切 App 风暴
  var _hideStart = 0;
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){
      _hideStart = Date.now();
    } else {
      if(_hideStart && Date.now() - _hideStart > 30000 && _dataDirty){
        // 隐藏超过 30 秒且有未同步变更，触发同步
        if(gistId && !syncing) doSync();
      }
      _hideStart = 0;
    }
  });

  // ─── 页面启动时：有云端则同步 ───
  async function init(){
    injectButtons();
    cb.reinjectCloudUI = injectButtons; // 暴露给主应用，renderMain 后可重新注入按钮
    if(gistId){
      // 启动时执行一次完整的同步（拉取+合并+推送）
      doSync();
      startAutoSync();
    }
  }

  // [FIX] 监听主应用 ready 事件（替代 setTimeout 500ms hack）
  function onReady(){
    if(cb.onReady){
      init();
    }
  }
  window.addEventListener('chronicle:ready', onReady);
  // [FIX] 主脚本先执行完毕时 chronicle:ready 已派发，需要立即初始化
  if(cb.onReady) init();

  // [FIX] 离线恢复：网络恢复时立即触发同步
  window.addEventListener('online', function(){
    if(gistId && !syncing){
      cb.toast('📡 网络已恢复，正在同步...', 'info');
      doSync();
    }
  });
  window.addEventListener('offline', function(){
    cb.toast('📡 网络断开，更改将在恢复后同步', 'info');
  });

  // 兜底：如果 chronicle:ready 在 DOM 加载完成后 2 秒内未触发，手动初始化
  var _fallbackTimer = setTimeout(function(){
    if(!cb.onReady) init();
  }, 2000);
  window.addEventListener('chronicle:ready', function(){ clearTimeout(_fallbackTimer); });

})();
</script>

<!-- ==================== 调试面板 ==================== -->
<script>
(function(){
  'use strict';
  var _dbg = [];
  var _panel = null;
  var _list = null;

  function ts(){ var d=new Date(); return d.toTimeString().slice(0,8)+'.'+String(d.getMilliseconds()).padStart(3,'0'); }

  function log(tag, msg, type){
    var entry = { time: ts(), tag: tag, msg: msg, type: type||'info' };
    _dbg.push(entry);
    if(_dbg.length > 200) _dbg.shift();
    if(_list){
      var el = document.createElement('div');
      el.style.cssText = 'padding:3px 6px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:11px;line-height:1.4;color:' +
        (type==='err'?'#ff6b6b':type==='ok'?'#51cf66':type==='warn'?'#ffd43b':'#adb5bd');
      el.textContent = '[' + ts() + '] [' + tag + '] ' + msg;
      _list.appendChild(el);
      _list.scrollTop = _list.scrollHeight;
    }
    if(type==='err') console.error('[DBG]', tag, msg);
    else console.log('[DBG]', tag, msg);
  }

  function togglePanel(){
    if(!_panel) buildPanel();
    _panel.style.display = _panel.style.display==='none'?'block':'none';
  }

  function buildPanel(){
    _panel = document.createElement('div');
    _panel.id = 'debug-panel';
    _panel.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:min(92vw,520px);z-index:9999;background:rgba(20,20,20,0.96);border:1px solid #444;border-radius:10px;max-height:50vh;display:none;backdrop-filter:blur(8px);';
    var hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #333;';
    hdr.innerHTML = '<span style="color:#ffd43b;font-size:13px;font-weight:bold">🐛 同步调试日志</span>';
    var copyBtn = document.createElement('button');
    copyBtn.textContent = '📋复制';
    copyBtn.style.cssText = 'margin-left:auto;background:#2d6a4f;border:none;color:#fff;padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;';
    copyBtn.onclick = function(){
      var text = _dbg.map(function(e){ return '['+e.time+'] ['+e.tag+'] '+e.msg; }).join('\n');
      navigator.clipboard.writeText(text).then(function(){
        copyBtn.textContent = '✓已复制';
        setTimeout(function(){ copyBtn.textContent = '📋复制'; }, 1500);
      }).catch(function(){
        // fallback: 创建临时 textarea
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); copyBtn.textContent = '✓已复制'; } catch(e){}
        document.body.removeChild(ta);
        setTimeout(function(){ copyBtn.textContent = '📋复制'; }, 1500);
      });
    };
    var clearBtn = document.createElement('button');
    clearBtn.textContent = '清空';
    clearBtn.style.cssText = 'margin-left:6px;background:#333;border:none;color:#aaa;padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;';
    clearBtn.onclick = function(){ _list.innerHTML=''; _dbg=[]; };
    var testBtn = document.createElement('button');
    testBtn.textContent = '测试API';
    testBtn.style.cssText = 'margin-left:6px;background:#1a73e8;border:none;color:#fff;padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;';
    testBtn.onclick = function(){ window._dbgTestAPI(); };
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '✕';
    closeBtn.style.cssText = 'margin-left:6px;background:none;border:none;color:#888;font-size:14px;cursor:pointer;padding:2px 6px;';
    closeBtn.onclick = function(){ _panel.style.display='none'; };
    hdr.appendChild(copyBtn);
    hdr.appendChild(clearBtn);
    hdr.appendChild(testBtn);
    hdr.appendChild(closeBtn);
    _list = document.createElement('div');
    _list.style.cssText = 'max-height:40vh;overflow-y:auto;padding:4px 0;font-family:monospace;';
    _panel.appendChild(hdr);
    _panel.appendChild(_list);
    document.body.appendChild(_panel);
    // replay existing logs
    _dbg.forEach(function(e){
      var el = document.createElement('div');
      el.style.cssText = 'padding:3px 6px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:11px;line-height:1.4;color:' +
        (e.type==='err'?'#ff6b6b':e.type==='ok'?'#51cf66':e.type==='warn'?'#ffd43b':'#adb5bd');
      el.textContent = '[' + e.time + '] [' + e.tag + '] ' + e.msg;
      _list.appendChild(el);
    });
    _list.scrollTop = _list.scrollHeight;
  }

  // 注入按钮 — 右侧薄条 tab，不挡任何区域
  function injectBtn(){
    if(document.getElementById('debug-toggle-btn')) return;
    var btn = document.createElement('button');
    btn.id = 'debug-toggle-btn';
    btn.textContent = '🐛';
    btn.title = '调试日志';
    btn.style.cssText = 'position:fixed;top:50%;right:0;z-index:9998;transform:translateY(-50%);width:22px;height:56px;border-radius:8px 0 0 8px;border:1px solid #555;border-right:none;background:rgba(40,40,40,0.88);color:#ffd43b;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:width .15s,background .15s;';
    btn.onmouseenter = function(){ btn.style.width='30px'; btn.style.background='rgba(50,50,50,0.96)'; };
    btn.onmouseleave = function(){ btn.style.width='22px'; btn.style.background='rgba(40,40,40,0.88)'; };
    btn.onclick = togglePanel;
    document.body.appendChild(btn);
  }

  // Hook fetch
  var _origFetch = window.fetch;
  window.fetch = function(){
    var url = (arguments[0] && typeof arguments[0]==='string') ? arguments[0] : (arguments[0] && arguments[0].url) || '?';
    var method = (arguments[1] && arguments[1].method) || 'GET';
    var shortUrl = url.replace(window.location.origin, '');
    var t0 = Date.now();
    log('FETCH', method + ' ' + shortUrl);
    return _origFetch.apply(this, arguments).then(function(resp){
      var ms = Date.now() - t0;
      // clone to read body without consuming
      var clone = resp.clone();
      clone.text().then(function(body){
        var preview = body.slice(0, 300);
        log('FETCH', resp.status + ' ' + shortUrl + ' (' + ms + 'ms, ' + body.length + 'B)',
          resp.ok ? 'ok' : 'err');
        if(!resp.ok || body.indexOf('"error"') >= 0){
          log('FETCH', '← ' + preview, 'warn');
        }
      });
      return resp;
    }).catch(function(err){
      var ms = Date.now() - t0;
      log('FETCH', 'FAIL ' + shortUrl + ' (' + ms + 'ms): ' + err.message, 'err');
      throw err;
    });
  };

  // Hook localStorage.setItem
  var _origSetItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(k, v){
    log('LS', 'setItem ' + k + ' (' + String(v).length + ' chars)');
    return _origSetItem(k, v);
  };

  // API test function
  window._dbgTestAPI = async function(){
    var gid = localStorage.getItem('chr_cloud_gist_id');
    log('TEST', '=== API 诊断开始 ===', 'warn');
    log('TEST', 'Gist ID: ' + (gid || '未设置'), gid ? 'ok' : 'err');
    log('TEST', 'Online: ' + navigator.onLine);
    log('TEST', 'UA: ' + navigator.userAgent.slice(0, 80));
    if(!gid){ log('TEST', '无 Gist ID，跳过 API 测试', 'err'); return; }
    try {
      var t0 = Date.now();
      log('TEST', '正在请求 /api/gist-read ...');
      var _api = (localStorage.getItem('chr_api_origin') || window.location.origin || '').replace(/\/+$/,'');
      var resp = await _origFetch(_api + '/api/gist-read', {
        headers: { 'X-Gist-ID': gid }
      });
      var ms = Date.now() - t0;
      log('TEST', 'Status: ' + resp.status + ' (' + ms + 'ms)', resp.ok ? 'ok' : 'err');
      var text = await resp.text();
      log('TEST', 'Response size: ' + text.length + 'B');
      log('TEST', 'Response preview: ' + text.slice(0, 200));
      if(resp.ok){
        try {
          var json = JSON.parse(text);
          var tasks = json.data && json.data.tasks;
          log('TEST', 'tasks 数量: ' + (tasks ? tasks.length : 'N/A'), tasks && tasks.length > 0 ? 'ok' : 'warn');
          log('TEST', 'version: ' + (json.data && json.data.version));
        } catch(e){
          log('TEST', 'JSON 解析失败: ' + e.message, 'err');
        }
      }
    } catch(e){
      log('TEST', '请求异常: ' + e.name + ': ' + e.message, 'err');
    }
    log('TEST', '=== API 诊断结束 ===', 'warn');
  };

  // 启动
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', function(){ injectBtn(); log('DBG','调试面板已加载','ok'); });
  } else {
    injectBtn(); log('DBG','调试面板已加载','ok');
  }
})();
</script>
</body>
</html>
